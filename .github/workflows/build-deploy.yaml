name: Build and Deploy
on: 
  push:
    branches:
      - main
  pull_request:
    types: 
      - opened
      - synchronize
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Build step
        run: echo "Building the application"
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.event_name == 'main'
    steps:
      - name: Deploy step
        run: echo "Deploying the app"
